name: Update game data

# 게임 패치/핫픽스 반영용 자동 갱신.
#   - 공식 API(open-api.bser.io) + dak.gg 에서 최신 캐릭터/아이템 데이터를 받아
#   - data/game/* 에 변경이 있을 때만 커밋하고 Pages 재배포를 트리거한다.
#   - 스킬 계수(data/skills/*)는 어떤 API에도 없어 자동화 대상이 아님(수동 큐레이션 유지).
#
# 실행 방법:
#   - 자동: 매일 04:00 KST 점검 (패치 다음 날 자동 반영)
#   - 수동: GitHub → Actions → "Update game data" → "Run workflow" 버튼
on:
  schedule:
    - cron: "0 19 * * *" # 매일 UTC 19:00 = KST 04:00
  workflow_dispatch:

permissions:
  contents: write # 변경된 data/ 커밋·푸시
  actions: write # 배포 워크플로(deploy.yml) 트리거

# 동시에 두 번 돌지 않도록(스케줄+수동 겹침 방지). 진행 중이면 대기.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # 최신 데이터 수집(--refresh = 캐시 무시하고 API 재호출).
      # ER_API_KEY 는 Secrets 에서 주입 — 키 교체 시 Secrets 값만 바꾸면 됨.
      # 수집이 비정상(급감/빈값)이면 스크립트가 쓰기 전에 중단 → 깨진 데이터 커밋 방지.
      - name: 최신 게임 데이터 수집
        env:
          ER_API_KEY: ${{ secrets.ER_API_KEY }}
        run: npm run fetch:data -- --refresh

      # 패치노트 수집(키 불필요): Steam 공지로 날짜·버전·목록을 잡고, 같은 버전의
      # ER 공식 글에서 한글 본문을 채운다. 커밋된 JSON이 캐시라 평소엔 증분 스캔만 한다.
      - name: 패치노트 수집(Steam 목록 + ER 한글 본문)
        run: npm run fetch:patch

      # characters/items/패치노트가 실제로 바뀐 경우에만 커밋(meta.json 의 타임스탬프만 바뀐 건 무시).
      - name: 변경 감지 후 커밋·푸시
        id: commit
        run: |
          if [ -n "$(git status --porcelain data/game/characters.json data/game/items.json data/game/patchNotesSteam.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/game
            git commit -m "chore(data): 게임 데이터/패치노트 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "데이터 변경 감지 — 커밋·푸시 완료"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "변경 없음 — 커밋/배포 생략"
          fi

      # 데이터가 바뀐 경우에만 기존 배포 워크플로를 트리거(GITHUB_TOKEN 푸시는 자동 트리거 안 됨).
      - name: Pages 재배포 트리거
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
